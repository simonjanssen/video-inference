[package]
name = "video-inference"
version = "0.0.1"
edition = "2024"

[features]
cli = ["dep:clap", "dep:dotenvy", "dep:rayon", "dep:tracing-subscriber"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.0", features = ["derive"], optional = true }
dotenvy = { version = "0.15", optional = true }
fast_image_resize = "6.0"
ndarray = "0.17.2"
ort = { version = "2.0.0-rc.12", features = ["tls-rustls"] }
rayon = { version = "1.11.0", optional = true }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"], optional = true }
video-rs = { version = "0.11.0", features = ["ndarray"] }

[target.'cfg(all(target_os = "macos", target_arch = "aarch64"))'.dependencies]
ort = { version = "2.0.0-rc.12", features = ["coreml"] }

[target.'cfg(all(target_os = "linux", target_arch = "aarch64"))'.dependencies]
ffmpeg-next = { version = "8.1.0", features = ["rpi"] }

[target.'cfg(not(all(target_os = "linux", target_arch = "aarch64")))'.dependencies]
ffmpeg-next = { version = "8.1.0" }
