[package]
name = "video-inference"
version = "0.0.1"
edition = "2024"

[dependencies]
ab_glyph = "0.2.32"
anyhow = "1.0.102"
clap = { version = "4.6.0", features = ["derive"] }
dotenvy = "0.15"
fast_image_resize = "6.0"
image = "0.25.10"
imageproc = "0.26.1"
ndarray = "0.17.2"
notify = "8.2.0"
ort = { version = "2.0.0-rc.12", features = ["coreml" ] }
rayon = "1.11.0"
serde = "1.0.228"
serde_json = "1.0.149"
tokio = { version = "1.51.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
video-rs = { version = "0.11.0", features = ["ndarray"] }
