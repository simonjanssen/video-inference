name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            clang \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libavfilter-dev \
            libavdevice-dev \
            libswscale-dev \
            libswresample-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          cache: true

      - name: additional cargo tools
        run: cargo install cargo-audit cargo-deny --locked

      - name: cargo audit 
        run: cargo audit --deny warnings

      - name: cargo deny check licenses
        run: cargo deny check licenses

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: cargo check (all features)
        run: cargo check --all-features --all-targets

      - name: cargo test (all features)
        run: cargo test --all-features --all-targets

      - name: cargo test (docs)
        run: cargo test --all-features --doc

      - name: cargo build docs
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --all-features --no-deps --lib
